[pushover]
app_token = dein_pushover_app_token
user_key = dein_pushover_user_key
# 2 = Emergency (wiederholt bis Bestätigung), 1 = High, 0 = Normal
priority_outage = 2
priority_recovery = 0
priority_retry = 60
priority_expire = 3600
priority_sound = siren

[fems]
ip = FEMS_IP
port = 80
username = x
password = user

[paths]
state_file = /var/lib/fems/state.json
audit_log = /var/log/fems/outages.log
