[pushover]
[pushover]
app_token = dein_pushover_app_token
user_key = dein_pushover_user_key
priority_outage = 2          # Emergency für Stromausfall
priority_recovery = 0        # Normal für Wiederherstellung
priority_retry = 30          # Retry-Intervall in Sekunden (nur für Priority 2)
priority_expire = 3600       # Max. Retry-Zeit in Sekunden (nur für Priority 2)
priority_sound = siren       # Sound-ID (siren, incoming, cosmic, etc.)

[fems]
ip = FEMS_IP
port = 80
username = x
password = user

[paths]
state_file = /var/lib/fems/state.json
audit_log = /var/log/fems/outages.log
